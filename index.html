<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整メーカー</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // 必要なパッケージをインターネット上(esm.sh)から直接インポート
    import React, { useState, useMemo } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { 
      ChevronLeft, 
      ChevronRight, 
      Copy, 
      Trash2, 
      Plus, 
      Check, 
      CalendarDays, 
      Clock, 
      FileText 
    } from 'https://esm.sh/lucide-react';

    // 30分単位の選択肢を生成 (8:00〜22:00)
    const timeOptions = [{ value: '', label: '--:--' }];
    for (let i = 8; i <= 22; i++) {
      for (let j = 0; j < 60; j += 30) {
        const h = String(i).padStart(2, '0');
        const m = String(j).padStart(2, '0');
        timeOptions.push({ value: `${h}:${m}`, label: `${h}:${m}` });
      }
    }

    // Appコンポーネント (export default は不要になります)
    function App() {
      // === 状態管理 ===
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedSlots, setSelectedSlots] = useState([]);
      
      // テキスト生成のフォーマット設定
      const [prefix, setPrefix] = useState("以下の日程でご都合いかがでしょうか。");
      const [suffix, setSuffix] = useState("上記日程で難しい場合は、別の日程をご提案いただけますと幸いです。\nよろしくお願いいたします。");
      const [includeYear, setIncludeYear] = useState(false);
      const [padZero, setPadZero] = useState(true);
      const [bulletStyle, setBulletStyle] = useState('・');
      
      const [copied, setCopied] = useState(false);

      // === カレンダーロジック ===
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const days = [];
      for (let i = 0; i < firstDay; i++) {
        days.push(null);
      }
      for (let i = 1; i <= daysInMonth; i++) {
        days.push(new Date(year, month, i));
      }
      // カレンダーのグリッドを埋めるための空セル
      const totalCells = Math.ceil(days.length / 7) * 7;
      for (let i = days.length; i < totalCells; i++) {
        days.push(null);
      }

      const nextMonth = () => setCurrentMonth(new Date(year, month + 1, 1));
      const prevMonth = () => setCurrentMonth(new Date(year, month - 1, 1));
      const todayMonth = () => setCurrentMonth(new Date());

      // === 日付・スロット操作ロジック ===
      const addSlot = (date) => {
        const newSlot = {
          id: Math.random().toString(36).substr(2, 9),
          date: date,
          startTime: '',
          endTime: ''
        };
        const newSlots = [...selectedSlots, newSlot].sort((a, b) => {
          if (a.date.getTime() === b.date.getTime()) {
            return (a.startTime || '').localeCompare(b.startTime || '');
          }
          return a.date - b.date;
        });
        setSelectedSlots(newSlots);
      };

      const removeSlot = (id) => {
        setSelectedSlots(selectedSlots.filter(s => s.id !== id));
      };

      const updateSlot = (id, field, value) => {
        const newSlots = selectedSlots.map(s => s.id === id ? { ...s, [field]: value } : s);
        newSlots.sort((a, b) => {
          if (a.date.getTime() === b.date.getTime()) {
            return (a.startTime || '').localeCompare(b.startTime || '');
          }
          return a.date - b.date;
        });
        setSelectedSlots(newSlots);
      };

      const toggleDate = (date) => {
        const existingSlots = selectedSlots.filter(s => s.date.getTime() === date.getTime());
        if (existingSlots.length > 0) {
          // 既に選択されている日付をクリックした場合は、その日のスロットを全て解除
          setSelectedSlots(selectedSlots.filter(s => s.date.getTime() !== date.getTime()));
        } else {
          addSlot(date);
        }
      };

      // === テキスト生成ロジック ===
      const formatDateStr = (d) => {
        const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
        const yearStr = includeYear ? `${d.getFullYear()}年` : '';
        const monthStr = padZero ? String(d.getMonth() + 1).padStart(2, '0') : String(d.getMonth() + 1);
        const dateStrPart = padZero ? String(d.getDate()).padStart(2, '0') : String(d.getDate());
        return `${yearStr}${monthStr}月${dateStrPart}日(${week})`;
      };

      const generatedText = useMemo(() => {
        let text = prefix;
        if (prefix) text += "\n\n";
        
        if (selectedSlots.length === 0) {
          text += "（カレンダーから日付を選択してください）\n";
        } else {
          selectedSlots.forEach(slot => {
            const dateStr = formatDateStr(slot.date);
            const bullet = bulletStyle ? `${bulletStyle} ` : '';
            
            let timeStr = "";
            if (slot.startTime && slot.endTime) {
              timeStr = ` ${slot.startTime}〜${slot.endTime}`;
            } else if (slot.startTime) {
              timeStr = ` ${slot.startTime}〜`;
            } else if (slot.endTime) {
              timeStr = ` 〜${slot.endTime}`;
            }
            
            text += `${bullet}${dateStr}${timeStr}\n`;
          });
        }
        
        if (suffix) text += "\n" + suffix;
        return text;
      }, [prefix, suffix, selectedSlots, includeYear, padZero, bulletStyle]);

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(generatedText);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          const textarea = document.createElement('textarea');
          textarea.value = generatedText;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
          {/* ヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center gap-3">
              <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-sm">
                <CalendarDays className="text-white" size={20} />
              </div>
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">
                日程調整メーカー
              </h1>
            </div>
          </header>

          {/* メインレイアウト */}
          <div className="flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto px-4 py-8">
            
            {/* 左カラム（カレンダーと選択スロット） */}
            <div className="flex-1 space-y-6 lg:max-w-[32rem]">
              
              {/* カレンダーカード */}
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center justify-between mb-4">
                  <button onClick={prevMonth} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 transition-colors">
                    <ChevronLeft size={20} />
                  </button>
                  <div className="font-bold text-lg text-slate-800 flex items-center gap-2">
                    {year}年 {month + 1}月
                    <button 
                      onClick={todayMonth} 
                      className="text-xs font-normal px-2.5 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-md transition-colors"
                    >
                      今日
                    </button>
                  </div>
                  <button onClick={nextMonth} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 transition-colors">
                    <ChevronRight size={20} />
                  </button>
                </div>

                <div className="grid grid-cols-7 gap-1">
                  {['日', '月', '火', '水', '木', '金', '土'].map((w, i) => (
                    <div 
                      key={w} 
                      className={`text-center text-xs font-bold py-2 
                      ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-400'}`}
                    >
                      {w}
                    </div>
                  ))}
                  {days.map((date, i) => {
                    if (!date) return <div key={`empty-${i}`} className="p-2"></div>;
                    
                    const isSelected = selectedSlots.some(s => s.date.getTime() === date.getTime());
                    const isToday = new Date().toDateString() === date.toDateString();
                    
                    return (
                      <button
                        key={date.toISOString()}
                        onClick={() => toggleDate(date)}
                        className={`w-10 h-10 rounded-full mx-auto flex items-center justify-center transition-all duration-200 text-sm
                          ${isSelected 
                            ? 'bg-blue-600 text-white font-bold shadow-md shadow-blue-200 hover:bg-blue-700' 
                            : 'text-slate-700 hover:bg-slate-100'}
                          ${isToday && !isSelected ? 'border-2 border-blue-500 text-blue-700 font-bold' : ''}
                        `}
                      >
                        {date.getDate()}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* 選択された日程カード */}
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-base font-bold text-slate-800 flex items-center gap-2">
                    <Check size={18} className="text-blue-500" />
                    選択した候補日
                  </h2>
                  {selectedSlots.length > 0 && (
                    <button 
                      onClick={() => setSelectedSlots([])}
                      className="text-xs text-slate-400 hover:text-red-500 transition-colors"
                    >
                      すべてクリア
                    </button>
                  )}
                </div>

                {selectedSlots.length === 0 ? (
                  <div className="text-center py-10 text-slate-400 text-sm border-2 border-dashed border-slate-100 rounded-xl">
                    <CalendarDays size={40} className="mx-auto mb-3 text-slate-200" />
                    <p>上のカレンダーから候補日を<br/>選択してください</p>
                  </div>
                ) : (
                  <div className="space-y-2.5 max-h-[300px] overflow-y-auto pr-1">
                    {selectedSlots.map((slot) => (
                      <div key={slot.id} className="flex flex-wrap sm:flex-nowrap items-center gap-2 p-2.5 bg-white rounded-xl shadow-sm border border-slate-200 hover:border-blue-300 transition-colors group">
                        <div className="font-medium text-slate-700 w-28 text-sm">
                          {formatDateStr(slot.date)}
                        </div>
                        <div className="flex items-center gap-1">
                          <select 
                            value={slot.startTime} 
                            onChange={(e) => updateSlot(slot.id, 'startTime', e.target.value)}
                            className="border border-slate-200 rounded p-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 w-[85px] cursor-pointer"
                          >
                            {timeOptions.map(opt => (
                              <option key={opt.value} value={opt.value}>{opt.label}</option>
                            ))}
                          </select>
                          <span className="text-slate-400 text-sm">〜</span>
                          <select 
                            value={slot.endTime} 
                            onChange={(e) => updateSlot(slot.id, 'endTime', e.target.value)}
                            className="border border-slate-200 rounded p-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 w-[85px] cursor-pointer"
                          >
                            {timeOptions.map(opt => (
                              <option key={opt.value} value={opt.value}>{opt.label}</option>
                            ))}
                          </select>
                        </div>
                        <div className="flex items-center ml-auto gap-0.5 opacity-100 sm:opacity-50 group-hover:opacity-100 transition-opacity">
                          <button 
                            onClick={() => addSlot(slot.date)} 
                            className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"
                            title="同じ日に時間を追加"
                          >
                            <Plus size={16} />
                          </button>
                          <button 
                            onClick={() => removeSlot(slot.id)} 
                            className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                            title="削除"
                          >
                            <Trash2 size={16} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* 右カラム（テキスト出力と設定） */}
            <div className="flex-1 lg:sticky lg:top-24 h-fit">
              <div className="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-2 mb-6 pb-4 border-b border-slate-100">
                  <FileText size={20} className="text-slate-500" />
                  <h2 className="text-base font-bold text-slate-800">テキストプレビュー</h2>
                </div>

                <div className="space-y-5">
                  
                  {/* 前置きテキスト */}
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">
                      前置きテキスト
                    </label>
                    <textarea 
                      value={prefix}
                      onChange={e => setPrefix(e.target.value)}
                      className="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y bg-slate-50/50"
                      rows="2"
                    />
                  </div>
                  
                  {/* フォーマット設定 */}
                  <div className="flex flex-wrap items-center gap-x-5 gap-y-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <label className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer hover:text-blue-600 transition-colors">
                      <input 
                        type="checkbox" 
                        checked={includeYear} 
                        onChange={e => setIncludeYear(e.target.checked)}
                        className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                      />
                      <span>年を含める</span>
                    </label>
                    <label className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer hover:text-blue-600 transition-colors">
                      <input 
                        type="checkbox" 
                        checked={padZero} 
                        onChange={e => setPadZero(e.target.checked)}
                        className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                      />
                      <span>ゼロ埋めする</span>
                    </label>
                    <div className="flex items-center gap-2 text-sm text-slate-700">
                      <span>箇条書き:</span>
                      <select 
                        value={bulletStyle} 
                        onChange={e => setBulletStyle(e.target.value)}
                        className="border border-slate-200 rounded-lg py-1 px-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer"
                      >
                        <option value="・">・</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="">なし</option>
                      </select>
                    </div>
                  </div>

                  {/* プレビューテキストエリア */}
                  <div className="relative group">
                    <textarea
                      readOnly
                      value={generatedText}
                      className="w-full bg-white border-2 border-slate-200 rounded-xl p-4 pr-4 font-mono text-sm leading-relaxed text-slate-700 min-h-[240px] outline-none focus:border-blue-400 resize-y shadow-inner"
                    />
                    
                    {/* コピーボタン */}
                    <button
                      onClick={handleCopy}
                      className={`absolute bottom-4 right-4 flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all duration-200 ${
                        copied 
                          ? 'bg-green-500 text-white shadow-green-200' 
                          : 'bg-slate-800 text-white hover:bg-slate-700 hover:shadow-md hover:-translate-y-0.5'
                      }`}
                    >
                      {copied ? <Check size={16} /> : <Copy size={16} />}
                      {copied ? 'コピーしました' : 'テキストをコピー'}
                    </button>
                  </div>

                  {/* 結びのテキスト */}
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">
                      結びのテキスト
                    </label>
                    <textarea 
                      value={suffix}
                      onChange={e => setSuffix(e.target.value)}
                      className="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y bg-slate-50/50"
                      rows="2"
                    />
                  </div>

                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // Reactアプリを id="root" の要素にレンダリング
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
